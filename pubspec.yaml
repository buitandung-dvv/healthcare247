name: health_care
description: "Healthcare - Ứng dụng theo dõi và chăm sóc sức khỏe toàn diện"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3

  # Navigation
  go_router: ^13.0.0

  # Storage & Database
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.8.3

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # URL Launcher
  url_launcher: ^6.2.5

  # YouTube Player
  youtube_player_flutter: ^9.1.1

  # Charts & Visualization
  fl_chart: ^0.66.2
  percent_indicator: ^4.2.3

  # Forms & Validation
  flutter_form_builder: ^9.2.1
  form_builder_validators: 11.1.2

  # Date & Time
  intl: ^0.19.0
  table_calendar: ^3.0.9

  # Image & Media
  image_picker: ^1.0.7
  path_provider: ^2.1.2

  # Animations
  animations: ^2.0.11
  flutter_animate: ^4.5.0

  # Audio & Music
  flutter_tts: ^4.0.2
  just_audio: ^0.9.36
  on_audio_query: ^2.9.0

  # Utils
  equatable: ^2.0.5
  uuid: ^4.3.3

  # Firebase & Social Login
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "AppIcon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "AppIcon.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - resources/images/
    - assets/icons/
    - assets/images/
    - assets/sounds/
    - assets/audio/

  # Using google_fonts package for Inter font
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700

